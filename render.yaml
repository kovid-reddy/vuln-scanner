services:
  - type: web
    name: vuln-scanner-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pnpm install && cd apps/api && npx prisma generate
    startCommand: cd apps/api && npx prisma migrate deploy && npx tsx src/server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_URL
        value: https://vuln-scanner-web.vercel.app